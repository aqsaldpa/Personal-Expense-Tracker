name: personal_expense_tracker
description: "Personal Expense Tracker - Neurogine Take-Home Assignment"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2

  # Local persistence (SQLite ORM)
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.40
  path_provider: ^2.1.5

  # Domain modeling
  freezed_annotation: ^3.1.0

  # Navigation
  go_router: ^16.2.4

  # Formatting (currency, date)
  intl: ^0.20.2
  fpdart: ^1.2.0

# 2.6.0 pulls in `objective_c` which needs a framework bundle that fails to load
# on this Flutter version; 2.5.1 uses pure Swift and works fine.
dependency_overrides:
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.2
  drift_dev: ^2.28.2
  freezed: ^3.2.3

  # Lints
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.2

flutter:
  uses-material-design: true
